<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deezer + CPU Temp - NZXT Kraken</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 640px;
            max-height: 640px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 12%;
        }

        #background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.4);
            z-index: 1;
            transition: background-image 0.8s ease-in-out;
        }

        #content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #album-art {
            width: 45%; /* Reduzido levemente para dar espaço à CPU */
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 12px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .playing {
            animation: pulse 2s infinite ease-in-out;
        }

        #track-title {
            font-size: 1.3rem;
            font-weight: bold;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        #artist-name {
            font-size: 0.95rem;
            color: #ccc;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        #status {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #007feb;
            margin-top: 8px;
            font-weight: bold;
        }

        /* Estilização do contador de Temperatura da CPU */
        #cpu-temp-container {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #cpu-value {
            color: #ff5d5d; /* Cor avermelhada clássica para temperatura */
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="background-blur"></div>
        <div id="content">
            <img id="album-art" src="" alt="Album Art" style="display: none;">
            <div id="track-title">Buscando música...</div>
            <div id="artist-name">Deezer Player</div>
            <div id="status">Conectando</div>
            
            <div id="cpu-temp-container">
                <span>CPU:</span>
                <span id="cpu-value">--°C</span>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const LASTFM_USER = 'arthur_shida'; 
        // Lembre-se de colar os 32 caracteres completos da sua chave aqui:
        const API_KEY = '152c13b7e74a4f66a2d6ceb0be427247'; 
        const INTERVAL_MS = 5000; 
        // ---------------------

        const trackTitleEl = document.getElementById('track-title');
        const artistNameEl = document.getElementById('artist-name');
        const albumArtEl = document.getElementById('album-art');
        const bgBlurEl = document.getElementById('background-blur');
        const statusEl = document.getElementById('status');
        const cpuValueEl = document.getElementById('cpu-value');

        let currentTrackUrl = "";

        // --- INTEGRAÇÃO COM A API DO NZXT CAM ---
        // O NZXT CAM injeta automaticamente a função nzxt nas páginas web rodando dentro dele
        window.nzxt = {
            v1: {
                onMonitoringDataUpdate: (data) => {
                    // Verifica se os dados de CPU estão disponíveis na leitura do hardware
                    if (data && data.cpu && data.cpu.temperature) {
                        // Arredonda o valor da temperatura para não exibir casas decimais
                        const temp = Math.round(data.cpu.temperature);
                        cpuValueEl.innerText = `${temp}°C`;
                    }
                }
            }
        };

        // --- BUSCA DO DEEZER (VIA LAST.FM) ---
        async function updateNowPlaying() {
            const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${API_KEY}&format=json&limit=1`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);

                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('Erro na resposta');
                
                const data = await response.json();
                if (!data.recenttracks || !data.recenttracks.track || data.recenttracks.track.length === 0) return;

                const track = data.recenttracks.track[0];
                const isPlaying = track['@attr'] && track['@attr'].nowplaying === 'true';
                
                if (track.url === currentTrackUrl) {
                    if (!isPlaying) {
                        statusEl.innerText = "Pausado";
                        albumArtEl.classList.remove('playing');
                    } else {
                        statusEl.innerText = "Tocando agora";
                        albumArtEl.classList.add('playing');
                    }
                    return;
                }

                currentTrackUrl = track.url;

                const title = track.name;
                const artist = track.artist['#text'];
                let imgUrl = track.image[track.image.length - 1]['#text']; 

                if (!imgUrl) {
                    imgUrl = 'https://www.deezer.com/assets/images/dev/deezer-logo-circle.png'; 
                }

                trackTitleEl.innerText = title;
                artistNameEl.innerText = artist;
                albumArtEl.src = imgUrl;
                albumArtEl.style.display = 'block';
                bgBlurEl.style.backgroundImage = `url('${imgUrl}')`;

                if (isPlaying) {
                    statusEl.innerText = "Tocando agora";
                    albumArtEl.classList.add('playing');
                } else {
                    statusEl.innerText = "Última tocada";
                    albumArtEl.classList.remove('playing');
                }

            } catch (error) {
                if (error.name === 'AbortError' || !navigator.onLine) {
                    statusEl.innerText = "Aguardando Conexão...";
                } else {
                    statusEl.innerText = "Tentando reconectar...";
                }
            }
        }

        updateNowPlaying();
        setInterval(updateNowPlaying, INTERVAL_MS);
    </script>
</body>
</html>
